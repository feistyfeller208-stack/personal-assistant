<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Personal Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Personal Assistant</h1>
            <div class="status" id="status">Initializing...</div>
        </header>
        
        <main>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search files...">
                <button id="searchButton">Search</button>
            </div>
            
            <div class="query-section">
                <textarea id="queryInput" placeholder="Ask me anything... (e.g., 'find files from last month')"></textarea>
                <button id="askButton">Ask</button>
            </div>
            
            <div class="quick-actions">
                <button onclick="PersonalAssistant.checkUnrepliedMessages()">
                    Check Unreplied Messages
                </button>
                <button onclick="PersonalAssistant.suggestPlaylist()">
                    Suggest Playlist
                </button>
                <button onclick="PersonalAssistant.showRecentFiles()">
                    Recent Files
                </button>
            </div>
            
            <div class="results" id="results">
                <!-- Results appear here -->
            </div>
        </main>
    </div>
    
    <!-- Libraries -->
    <script src="lib/localforage.min.js"></script>
    
    <!-- Cordova/Median.co will inject cordova.js -->
    <script src="cordova.js"></script>
    
    <!-- App scripts -->
    <script src="js/app.js"></script>
    <script src="js/file-indexer.js"></script>
    <script src="js/notification-tracker.js"></script>
</body>
</html>
